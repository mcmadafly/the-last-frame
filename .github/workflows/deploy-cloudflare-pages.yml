# Optional manual deploy from GitHub Actions (Run workflow). Production deploys use
# Cloudflare Pages → Connect to Git (build on push to main), not this workflow.
#
# Secrets (only if you use workflow_dispatch):
#   CLOUDFLARE_API_TOKEN   — Pages Edit (or Workers template)
#   CLOUDFLARE_ACCOUNT_ID  — Workers & Pages → account id

name: Deploy Cloudflare Pages

on:
  workflow_dispatch:

concurrency:
  group: pages-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=the-last-frame
