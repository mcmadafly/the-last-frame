# Cloudflare Pages — static Astro + Functions in ./functions
#
# Git-connected Pages (dashboard → Settings → Builds):
#   Build command:            npm run build
#   Build output directory:  dist
#   Deploy command:          npx wrangler pages deploy dist --project-name=the-last-frame
#                            (if empty is not allowed). Never use `wrangler deploy`.
#
# Optional: GitHub Actions workflow is workflow_dispatch-only — push to main does not deploy via GH.
# Local: npm run pages:deploy

name = "the-last-frame"
compatibility_date = "2024-11-12"
pages_build_output_dir = "dist"
